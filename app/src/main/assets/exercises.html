function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  let html = '';
  let qNum = 0;
  let fillNum = 0;

  quizData.forEach(chap => {
    html += `<div class="chapter"><h2 class="chapter-title">${escapeHtml(chap.chapter)}</h2>`;
    chap.sections.forEach(sec => {
      html += `<h3 class="section-title">${escapeHtml(sec.title)}</h3>`;
      html += `<h4 class="type-title">一、选择题</h4>`;
      sec.choices.forEach((q, idx) => {
        qNum++;
        const id = `choice-${qNum}`;
        html += `<div class="question" id="${id}">`;
        html += `<div class="q-stem"><span class="q-num">${idx + 1}.</span>${escapeHtml(q.stem)}（　　）</div>`;
        html += `<div class="options">`;
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, i) => {
          html += `<label data-letter="${letters[i]}">
            <input type="radio" name="${id}" value="${letters[i]}" onchange="checkChoice('${id}', '${q.answer}', this)">
            ${letters[i]}. ${escapeHtml(opt)}
          </label>`;
        });
        html += `</div>`;
        html += `<button class="check-btn" onclick="document.getElementById('${id}-ans').classList.add('show')">查看答案</button>`;
        html += `<div class="answer" id="${id}-ans">${escapeHtml(q.answer)}</div>`;
        html += `</div>`;
      });
      html += `<h4 class="type-title">二、填空题</h4>`;
      sec.fills.forEach((f, idx) => {
        fillNum++;
        const id = `fill-${fillNum}`;
        const blanks = (f.text.match(/_{2,}/g) || []).length;
        html += `<div class="question" id="${id}">`;
        html += `<div class="q-stem"><span class="q-num">${idx + 1}.</span>${formatFillText(f.text)}</div>`;
        html += `<div class="fill-blank">`;
        const answers = f.answer.split('；');
        for (let i = 0; i < blanks; i++) {
          const ans = (answers[i] || '').trim();
          html += `<input type="text" class="blank-input" data-ans="${escapeHtml(ans)}" onblur="checkBlank(this)" placeholder="空${i+1}">`;
          if (i < blanks - 1) html += '、';
        }
        html += `<button class="check-btn" onclick="checkFillQuestion('${id}')">验证</button>`;
        html += `<button class="check-btn" onclick="document.getElementById('${id}-ans').classList.add('show')">查看答案</button>`;
        html += `</div>`;
        html += `<div class="answer" id="${id}-ans">${escapeHtml(f.answer)}</div>`;
        html += `</div>`;
      });
    });
    html += `</div>`;
  });

  container.innerHTML = html;
  totalCount = qNum + fillNum;
  document.getElementById('totalCount').textContent = totalCount;
}

function formatFillText(text) {
  // 把所有连续 2+ 个下划线替换为 ______，保持其他文字不变
  return escapeHtml(text);
}

function checkChoice(id, correct, input) {
  const qEl = document.getElementById(id);
  const labels = qEl.querySelectorAll('.options label');
  labels.forEach(l => {
    l.classList.remove('correct', 'incorrect');
  });
  if (input.value === correct) {
    input.parentElement.classList.add('correct');
    qEl.classList.add('answered');
    qEl.classList.remove('wrong');
  } else {
    input.parentElement.classList.add('incorrect');
    labels.forEach(l => {
      if (l.getAttribute('data-letter') === correct) l.classList.add('correct');
    });
    qEl.classList.add('wrong');
    qEl.classList.remove('answered');
  }
  updateStats();
}

function checkBlank(input) {
  const userAns = input.value.trim();
  const correctAns = input.getAttribute('data-ans').trim();
  input.classList.remove('correct', 'wrong');
  if (userAns === '') return;
  if (userAns === correctAns) {
    input.classList.add('correct');
  } else {
    input.classList.add('wrong');
  }
  updateStats();
}

function checkFillQuestion(id) {
  const qEl = document.getElementById(id);
  const inputs = qEl.querySelectorAll('.blank-input');
  inputs.forEach(inp => checkBlank(inp));
}

function showAllAnswers() {
  document.querySelectorAll('.answer').forEach(a => a.classList.add('show'));
}
function hideAllAnswers() {
  document.querySelectorAll('.answer').forEach(a => a.classList.remove('show'));
}
function toggleAllAnswers() {
  const answers = document.querySelectorAll('.answer');
  const allShown = Array.from(answers).every(a => a.classList.contains('show'));
  answers.forEach(a => a.classList.toggle('show', !allShown));
}
function resetAll() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.querySelectorAll('.blank-input').forEach(i => {
    i.value = '';
    i.classList.remove('correct', 'wrong');
  });
  document.querySelectorAll('.options label').forEach(l => l.classList.remove('correct', 'incorrect'));
  document.querySelectorAll('.question').forEach(q => q.classList.remove('answered', 'wrong'));
  document.querySelectorAll('.answer').forEach(a => a.classList.remove('show'));
  answeredCount = 0;
  updateStats();
}
function updateStats() {
  let count = 0;
  document.querySelectorAll('.question.answered').forEach(q => count++);
  document.querySelectorAll('.blank-input.correct').forEach(i => count++);
  answeredCount = count;
  document.getElementById('answeredCount').textContent = answeredCount;
}

buildQuiz();
